<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for Premium Gradients and Glow Effects -->
  <defs>
    <!-- Background Gradient for Enterprise Feel -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>

    <!-- Core Emerald to Teal Gradient (MasoMind Signature) -->
    <linearGradient id="masoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <!-- Subtle Accent Lightning Gradient -->
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Drop Shadow for Node Network Layer -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Dark Background Layer -->
  <rect width="100%" height="100%" fill="#09090b" />
  <circle cx="256" cy="256" r="256" fill="url(#bgGlow)" />

  <g transform="translate(0, -10)" filter="url(#glow)">
    <!-- Left Hemisphere (Neural Networks & Nodes) -->
    <path d="M236,140 C170,140 130,185 130,250 C130,300 160,335 190,355 C205,365 215,385 220,400 L236,400 Z" 
          fill="none" stroke="url(#masoGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    
    <!-- Left Internal Neural Pathways -->
    <path d="M165,210 Q195,230 225,210" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <path d="M145,270 Q180,280 210,260" fill="none" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <path d="M175,325 Q200,310 220,330" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

    <!-- Right Hemisphere (Sleek Geometric Tech Shell) -->
    <path d="M276,140 C342,140 382,185 382,250 C382,300 352,335 322,355 C307,365 297,385 292,400 L276,400 Z" 
          fill="none" stroke="url(#masoGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Right Tech Grid Accents -->
    <path d="M310,185 L285,220 L340,220" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linejoin="round" opacity="0.5"/>
    <path d="M365,260 L320,280 L350,315" fill="none" stroke="#10b981" stroke-width="3" stroke-linejoin="round" opacity="0.5"/>

    <!-- Central Power Source: The Intent-Based Lightning Bolt -->
    <polygon points="270,110 190,260 250,260 220,410 320,230 255,230" 
             fill="url(#boltGradient)" />

    <!-- Synaptic Network Nodes (Connected Circles) -->
    <circle cx="130" cy="250" r="7" fill="#34d399" />
    <circle cx="190" cy="155" r="5" fill="#14b8a6" />
    <circle cx="322" cy="355" r="6" fill="#ffffff" />
    <circle cx="382" cy="250" r="7" fill="#34d399" />
    <circle cx="220" cy="400" r="5" fill="#10b981" />
    <circle cx="292" cy="400" r="5" fill="#10b981" />
    <circle cx="250" cy="140" r="4" fill="#ffffff" />
  </g>

  <!-- Premium Typography for Identity Asset -->
  <text x="256" y="465" 
        text-anchor="middle" 
        fill="#f4f4f5" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="800" 
        font-size="28" 
        letter-spacing="6">MASOMIND</text>
</svg>
